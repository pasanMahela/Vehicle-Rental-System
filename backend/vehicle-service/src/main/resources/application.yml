server:
  port: 8082

spring:
  application:
    name: vehicle-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/vehicle-db}

access-control:
  vehicle-crud: OWNER
  vehicle-status: CUSTOMER,BOOKING_CASHIER,REPAIR_ADVISOR,OWNER

booking:
  service:
    url: ${BOOKING_SERVICE_URL:http://localhost:8083}

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
