# Application name
spring.application.name=maintenance-service

# Server port
server.port=8085

# MongoDB connection
spring.data.mongodb.uri=mongodb+srv://user:user123@cluster0.asncl8a.mongodb.net/maintenance_db?retryWrites=true&w=majority

# Connection pool settings
spring.data.mongodb.auto-index-creation=true

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.mongodb.driver=DEBUG


# =====================================================
# Service URLs for inter-service communication
# =====================================================

# API Gateway URL (for Docker environment)
api.gateway.url=http://api-gateway:8080

# All inter-service calls should go through API gateway
auth.service.url=http://api-gateway:8080

# Notification Service (via gateway)
notification.service.url=http://api-gateway:8080

# Vehicle Service (via gateway)
vehicle.service.url=http://api-gateway:8080

# Payment Service (via gateway)
payment.service.url=http://api-gateway:8080

# =====================================================
# Access Control Configuration
# =====================================================
access-control.issue-report=CUSTOMER,REPAIR_ADVISOR
access-control.maintenance-schedule=REPAIR_ADVISOR
access-control.maintenance-manage=REPAIR_ADVISOR

# =====================================================
# OpenAPI/Swagger Documentation
# =====================================================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true

# =====================================================
# Actuator Configuration
# =====================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized