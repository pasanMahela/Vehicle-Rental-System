# Application name
spring.application.name=${APP_NAME:maintenance-service}

# Server port
server.port=${SERVER_PORT:8085}

# MongoDB connection from .env file
spring.data.mongodb.uri=${MONGODB_URI}

# Connection pool settings
spring.data.mongodb.auto-index-creation=true

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.mongodb.driver=DEBUG


# =====================================================
# Service URLs for inter-service communication
# =====================================================

# API Gateway URL (for Docker environment)
api.gateway.url=${API_GATEWAY_URL:http://localhost:8080}

# All inter-service calls should go through API gateway
auth.service.url=${AUTH_SERVICE_URL:${api.gateway.url}}

# Notification Service (via gateway)
notification.service.url=${NOTIFICATION_SERVICE_URL:${api.gateway.url}}

# Vehicle Service (via gateway)
vehicle.service.url=${VEHICLE_SERVICE_URL:${api.gateway.url}}

# Payment Service (via gateway)
payment.service.url=${PAYMENT_SERVICE_URL:${api.gateway.url}}

# =====================================================
# Access Control Configuration
# =====================================================
access-control.issue-report=CUSTOMER,REPAIR_ADVISOR
access-control.maintenance-schedule=REPAIR_ADVISOR
access-control.maintenance-manage=REPAIR_ADVISOR