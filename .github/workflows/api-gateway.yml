name: api-gateway

on:
  push:
    paths:
      - 'backend/api-gateway/**'
      - '.github/workflows/api-gateway.yml'
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Run tests
        run: mvn test

  sonarcloud:
    needs: build-test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend/api-gateway

  snyk:
    needs: build-test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        with:
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Snyk SARIF report
        uses: snyk/actions/maven@master
        with:
          command: test --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Upload Snyk SARIF
        if: hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

  build-push-acr:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/api-gateway:latest -f backend/api-gateway/Dockerfile.azure backend/api-gateway
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api-gateway:latest

  deploy:
    needs: build-push-acr
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Container Apps
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          az containerapp update \
            --name api-gateway \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/api-gateway:latest \
            --set-env-vars AUTH_SERVICE_URL=https://auth-service.agreeablepebble-671ffeb1.eastasia.azurecontainerapps.io PAYMENT_SERVICE_URL=https://payment-service.agreeablepebble-671ffeb1.eastasia.azurecontainerapps.io NOTIFICATION_SERVICE_URL=https://notification-service.agreeablepebble-671ffeb1.eastasia.azurecontainerapps.io VEHICLE_SERVICE_URL=http://localhost:8082 BOOKING_SERVICE_URL=http://localhost:8083 MAINTENANCE_SERVICE_URL=http://localhost:8085 JWT_SECRET=OrchidVehicleRentalSecretKeyForJWTTokenGeneration2024SecureKey
