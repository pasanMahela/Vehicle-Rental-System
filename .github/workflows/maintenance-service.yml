name: Maintenance Service CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/maintenance-service/**'
      - '.github/workflows/maintenance-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/maintenance-service/**'

env:
  SERVICE_PATH: backend/maintenance-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        working-directory: backend
        run: |
          mvn clean test -pl maintenance-service -am -B -Dspring.profiles.active=test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/maintenance-service/target/surefire-reports/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: maintenance-service-jar
          path: backend/maintenance-service/target/*.jar

  # Job 2: Quality & Security (Optional - remove if not needed)
  quality-checks:
    name: Quality & Security
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: SonarCloud Analysis
        if: secrets.SONAR_TOKEN != ''
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar -pl maintenance-service -am \
            -Dsonar.projectKey=dinith114_Vehicle-Rental-System \
            -Dsonar.organization=dinith114 \
            -Dsonar.host.url=https://sonarcloud.io \
            -DskipTests

      - name: Snyk Security Scan
        if: secrets.SNYK_TOKEN != ''
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/maintenance-service/pom.xml --severity-threshold=high

  # Job 3: Docker Build & Push
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: maintenance-service-jar
          path: backend/maintenance-service/target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/maintenance-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/maintenance-service:latest,${{ secrets.DOCKER_USERNAME }}/maintenance-service:${{ github.sha }}

  # Job 4: Deploy
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: maintenance-service
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.DOCKER_USERNAME }}/maintenance-service:latest