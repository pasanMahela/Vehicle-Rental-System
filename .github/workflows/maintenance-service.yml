name: Maintenance Service CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/maintenance-service/**'
      - '.github/workflows/maintenance-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/maintenance-service/**'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  SERVICE_PATH: backend/maintenance-service

jobs:
  # Job 1: Build and Test
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: |
          echo "Building maintenance-service..."
          mvn clean package -pl maintenance-service -am -DskipTests -B -e
        continue-on-error: false

      - name: Run Unit Tests (optional)
        working-directory: backend
        run: |
          echo "Running tests with test profile..."
          mvn test -pl maintenance-service -B -Dspring.profiles.active=test || echo "Tests skipped or failed - continuing build"
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: test-results
          path: backend/maintenance-service/target/surefire-reports/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: maintenance-service-jar
          path: backend/maintenance-service/target/*.jar
          if-no-files-found: warn

  # Job 2: Code Quality - SonarCloud
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN not configured, skipping SonarCloud analysis"
            exit 0
          fi
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -pl maintenance-service -am \
            -Dsonar.projectKey=${{ secrets.SONAR_MAINTENANCE_PROJECT_KEY || 'dinith114_Vehicle-Rental-System' }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION || 'dinith114' }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -DskipTests
        continue-on-error: true

  # Job 3: Security Scan - Snyk
  security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: vars.SNYK_TOKEN != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project for Snyk
        working-directory: backend
        run: mvn clean package -pl maintenance-service -am -DskipTests -B

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@cdb760004ba9ea4d525f2e043745dfe85bb9077e  # 0.4.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/maintenance-service/pom.xml --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk report
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

  # Job 4: Build and Push Docker Image
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Validate Docker credentials
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "ERROR: DOCKER_USERNAME secret is not set"
            exit 1
          fi
          echo "Docker username is configured"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: maintenance-service-jar
          path: backend/maintenance-service/target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/maintenance-service
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/maintenance-service
          file: ./backend/maintenance-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 5: Deploy to Azure Container Apps (Optional)
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Login to Azure
        id: azure-login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Deploy to Azure Container Apps
        if: steps.azure-login.outcome == 'success'
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: maintenance-service
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.DOCKER_USERNAME }}/maintenance-service:latest
