name: Notification Service CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/notification-service/**'
      - '.github/workflows/notification-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/notification-service/**'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  SERVICE_PATH: backend/notification-service

jobs:
  # Job 1: Build and Test
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -pl notification-service -am -DskipTests -B

      - name: Run Tests
        working-directory: backend
        run: mvn test -pl notification-service -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-jar
          path: backend/notification-service/target/*.jar

  # Job 2: Code Quality - SonarCloud
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
              -pl notification-service -am \
              -Dsonar.projectKey=dinith114_Vehicle-Rental-System \
              -Dsonar.organization=dinith114 \
              -Dsonar.host.url=https://sonarcloud.io \
              -DskipTests
          else
            echo "SONAR_TOKEN not set, skipping SonarCloud analysis"
          fi
        continue-on-error: true

  # Job 3: Security Scan - Snyk
  security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/notification-service/pom.xml --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk report
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        if: hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

  # Job 4: Build and Push Docker Image to ACR
  docker:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: notification-service-jar
          path: backend/notification-service/target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./backend/notification-service
          file: ./backend/notification-service/Dockerfile.azure
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/notification-service:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 5: Deploy to Azure Container Apps
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Update Container App image
        env:
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          az login --service-principal \
            -u "$ACR_USER" \
            -p "$ACR_PASS" \
            --tenant "$TENANT_ID"

          az containerapp update \
            --name notification-service \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_SERVER/notification-service:$COMMIT_SHA" \

