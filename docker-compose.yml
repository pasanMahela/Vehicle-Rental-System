version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: orchid-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - orchid-network

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - VEHICLE_SERVICE_URL=http://vehicle-service:8082
      - BOOKING_SERVICE_URL=http://booking-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - MAINTENANCE_SERVICE_URL=http://maintenance-service:8085
      - NOTIFICATION_SERVICE_URL=http://notification-service:8086
      - JWT_SECRET=OrchidVehicleRentalSecretKeyForJWTTokenGeneration2024SecureKey
    depends_on:
      - auth-service
      - vehicle-service
      - booking-service
      - payment-service
      - maintenance-service
      - notification-service
    networks:
      - orchid-network

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/auth-db
      - JWT_SECRET=OrchidVehicleRentalSecretKeyForJWTTokenGeneration2024SecureKey
    depends_on:
      - mongodb
    networks:
      - orchid-network

  vehicle-service:
    build:
      context: ./backend
      dockerfile: vehicle-service/Dockerfile
    container_name: vehicle-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/vehicle-db
    depends_on:
      - mongodb
    networks:
      - orchid-network

  booking-service:
    build:
      context: ./backend
      dockerfile: booking-service/Dockerfile
    container_name: booking-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/booking-db
      - VEHICLE_SERVICE_URL=http://vehicle-service:8082
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - NOTIFICATION_SERVICE_URL=http://notification-service:8086
      - MAINTENANCE_SERVICE_URL=http://maintenance-service:8085
    depends_on:
      - mongodb
      - vehicle-service
    networks:
      - orchid-network

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/payment-db
      - BOOKING_SERVICE_URL=http://booking-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8086
    depends_on:
      - mongodb
    networks:
      - orchid-network

  maintenance-service:
    build:
      context: ./backend
      dockerfile: maintenance-service/Dockerfile
    container_name: maintenance-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/maintenance-db
      - VEHICLE_SERVICE_URL=http://vehicle-service:8082
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - NOTIFICATION_SERVICE_URL=http://notification-service:8086
    depends_on:
      - mongodb
    networks:
      - orchid-network

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/notification-db
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=your-email@gmail.com
      - SPRING_MAIL_PASSWORD=your-app-password
    depends_on:
      - mongodb
    networks:
      - orchid-network

volumes:
  mongo-data:

networks:
  orchid-network:
    driver: bridge
