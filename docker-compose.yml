services:
  mongodb:
    image: mongo:7.0
    platform: linux/amd64
    container_name: orchid-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - orchid-network

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8087:8087"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - VEHICLE_SERVICE_URL=http://vehicle-service:8082
      - BOOKING_SERVICE_URL=http://booking-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - MAINTENANCE_SERVICE_URL=http://maintenance-service:8085
      - NOTIFICATION_SERVICE_URL=http://notification-service:8086
      - JWT_SECRET=OrchidVehicleRentalSecretKeyForJWTTokenGeneration2024SecureKey
    depends_on:
      - auth-service
      - vehicle-service
      - booking-service
      - payment-service
      - maintenance-service
      - notification-service
    networks:
      - orchid-network

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/auth-db
      - JWT_SECRET=OrchidVehicleRentalSecretKeyForJWTTokenGeneration2024SecureKey
    depends_on:
      - mongodb
    networks:
      - orchid-network

  vehicle-service:
    build:
      context: ./backend
      dockerfile: vehicle-service/Dockerfile
    container_name: vehicle-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb+srv://dinith114:dinith114@cluster0.jaljain.mongodb.net/vehicle-db?retryWrites=true&w=majority&appName=Cluster0
      - BOOKING_SERVICE_URL=http://api-gateway:8087
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - mongodb
    networks:
      - orchid-network

  booking-service:
    build:
      context: ./backend
      dockerfile: booking-service/Dockerfile
    container_name: booking-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb+srv://jayangi:dmjprLC1818@cluster0.g4inw.mongodb.net/vehicle-db?retryWrites=true&w=majority&authSource=admin
      - VEHICLE_SERVICE_URL=http://api-gateway:8087
      - PAYMENT_SERVICE_URL=http://api-gateway:8087
      - NOTIFICATION_SERVICE_URL=http://api-gateway:8087
      - MAINTENANCE_SERVICE_URL=http://api-gateway:8087
    depends_on:
      - mongodb
    networks:
      - orchid-network

  payment-service:
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb+srv://admin:1234@rental.z6qzg6i.mongodb.net/payment-db?retryWrites=true&w=majority&appName=rental
      - BOOKING_SERVICE_URL=${API_GATEWAY_URL}
      - NOTIFICATION_SERVICE_URL=${API_GATEWAY_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - orchid-network

  maintenance-service:
    build:
      context: ./backend/maintenance-service
      dockerfile: Dockerfile
    container_name: maintenance-service
    ports:
      - "8085:8085"
    env_file:
      - ./backend/maintenance-service/src/main/resources/maintenance-secrets.env
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
      - AUTH_SERVICE_URL=http://api-gateway:8080
      - VEHICLE_SERVICE_URL=http://api-gateway:8080
      - NOTIFICATION_SERVICE_URL=http://api-gateway:8080
      - PAYMENT_SERVICE_URL=http://api-gateway:8080
    depends_on:
      - mongodb
    networks:
      - orchid-network

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/notification-db
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=your-email@gmail.com
      - SPRING_MAIL_PASSWORD=your-app-password
    depends_on:
      - mongodb
    networks:
      - orchid-network

volumes:
  mongo-data:

networks:
  orchid-network:
    driver: bridge
